<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/L.Control.Locate.min.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet.photon.css">
        <link rel="stylesheet" href="css/leaflet-measure.css">
        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        </style>
        <title></title>
    </head>
    <body>
        <div id="map">
        </div>
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/L.Control.Locate.min.js"></script>
        <script src="js/multi-style-layer.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet.photon.js"></script>
        <script src="js/leaflet-measure.js"></script>
        <script src="data/La_Gran_Piura_1.js"></script>
        <script src="data/Carretera_Piura_Sechura_2.js"></script>
        <script src="data/Puntos_Geodesicos_3.js"></script>
        <script>
        var highlightLayer;
        function highlightFeature(e) {
            highlightLayer = e.target;

            if (e.target.feature.geometry.type === 'LineString' || e.target.feature.geometry.type === 'MultiLineString') {
              highlightLayer.setStyle({
                color: 'rgba(255, 255, 0, 1.00)',
              });
            } else {
              highlightLayer.setStyle({
                fillColor: 'rgba(255, 255, 0, 1.00)',
                fillOpacity: 1
              });
            }
        }
        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[-5.1758827893497,-80.77577956021811],[-5.16100820244299,-80.7490260669158]]);
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/tomchadwin/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }
        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);
        L.control.locate({locateOptions: {maxZoom: 19}}).addTo(map);
        var measureControl = new L.Control.Measure({
            position: 'topleft',
            primaryLengthUnit: 'meters',
            secondaryLengthUnit: 'kilometers',
            primaryAreaUnit: 'sqmeters',
            secondaryAreaUnit: 'hectares'
        });
        measureControl.addTo(map);
        document.getElementsByClassName('leaflet-control-measure-toggle')[0].innerHTML = '';
        document.getElementsByClassName('leaflet-control-measure-toggle')[0].className += ' fas fa-ruler';
        var bounds_group = new L.featureGroup([]);
        function setBounds() {
        }
        map.createPane('pane_GoogleSatellite_0');
        map.getPane('pane_GoogleSatellite_0').style.zIndex = 400;
        var layer_GoogleSatellite_0 = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
            pane: 'pane_GoogleSatellite_0',
            opacity: 1.0,
            attribution: '<a href="https://www.google.at/permissions/geoguidelines/attr-guide.html">Map data ©2015 Google</a>',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 20
        });
        layer_GoogleSatellite_0;
        map.addLayer(layer_GoogleSatellite_0);
        function pop_La_Gran_Piura_1(feature, layer) {
            layer.on({
                mouseout: function(e) {
                    for (var i in e.target._eventParents) {
                        if (typeof e.target._eventParents[i].resetStyle === 'function') {
                            e.target._eventParents[i].resetStyle(e.target);
                        }
                    }
                },
                mouseover: highlightFeature,
            });
            var popupContent = '<table>\
                    <tr>\
                        <th scope="row">Partida</th>\
                        <td>' + (feature.properties['Partida'] !== null ? autolinker.link(String(feature.properties['Partida']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Area</th>\
                        <td>' + (feature.properties['Area'] !== null ? autolinker.link(String(feature.properties['Area']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Perimetro</th>\
                        <td>' + (feature.properties['Perimetro'] !== null ? autolinker.link(String(feature.properties['Perimetro']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Lote</th>\
                        <td>' + (feature.properties['Lote'] !== null ? autolinker.link(String(feature.properties['Lote']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">HU</th>\
                        <td>' + (feature.properties['HU'] !== null ? autolinker.link(String(feature.properties['HU']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_La_Gran_Piura_1_0(feature) {
            switch(String(feature.properties['HU'])) {
                case 'VIVEMAS':
                    return {
                pane: 'pane_La_Gran_Piura_1',
                opacity: 1,
                color: 'rgba(227,26,28,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 3.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(253,191,111,1.0)',
                interactive: true,
            }
                    break;
                default:
                    return {
                pane: 'pane_La_Gran_Piura_1',
                opacity: 1,
                color: 'rgba(0,0,0,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 2.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(173,187,195,1.0)',
                interactive: true,
            }
                    break;
            }
        }
        map.createPane('pane_La_Gran_Piura_1');
        map.getPane('pane_La_Gran_Piura_1').style.zIndex = 401;
        map.getPane('pane_La_Gran_Piura_1').style['mix-blend-mode'] = 'normal';
        var layer_La_Gran_Piura_1 = new L.geoJson(json_La_Gran_Piura_1, {
            attribution: '',
            interactive: true,
            dataVar: 'json_La_Gran_Piura_1',
            layerName: 'layer_La_Gran_Piura_1',
            pane: 'pane_La_Gran_Piura_1',
            onEachFeature: pop_La_Gran_Piura_1,
            style: style_La_Gran_Piura_1_0,
        });
        bounds_group.addLayer(layer_La_Gran_Piura_1);
        map.addLayer(layer_La_Gran_Piura_1);
        function pop_Carretera_Piura_Sechura_2(feature, layer) {
            layer.on({
                mouseout: function(e) {
                    for (var i in e.target._eventParents) {
                        if (typeof e.target._eventParents[i].resetStyle === 'function') {
                            e.target._eventParents[i].resetStyle(e.target);
                        }
                    }
                },
                mouseover: highlightFeature,
            });
            var popupContent = '<table>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['OBJECTID'] !== null ? autolinker.link(String(feature.properties['OBJECTID']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['SHAPE_Leng'] !== null ? autolinker.link(String(feature.properties['SHAPE_Leng']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['Via'] !== null ? autolinker.link(String(feature.properties['Via']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_Carretera_Piura_Sechura_2_0() {
            return {
                pane: 'pane_Carretera_Piura_Sechura_2',
                opacity: 1,
                color: 'rgba(227,26,28,1.0)',
                dashArray: '',
                lineCap: 'round',
                lineJoin: 'round',
                weight: 7.0,
                fillOpacity: 0,
                interactive: false,
            }
        }
        map.createPane('pane_Carretera_Piura_Sechura_2');
        map.getPane('pane_Carretera_Piura_Sechura_2').style.zIndex = 402;
        map.getPane('pane_Carretera_Piura_Sechura_2').style['mix-blend-mode'] = 'normal';
        var layer_Carretera_Piura_Sechura_2 = new L.geoJson(json_Carretera_Piura_Sechura_2, {
            attribution: '',
            interactive: false,
            dataVar: 'json_Carretera_Piura_Sechura_2',
            layerName: 'layer_Carretera_Piura_Sechura_2',
            pane: 'pane_Carretera_Piura_Sechura_2',
            onEachFeature: pop_Carretera_Piura_Sechura_2,
            style: style_Carretera_Piura_Sechura_2_0,
        });
        bounds_group.addLayer(layer_Carretera_Piura_Sechura_2);
        map.addLayer(layer_Carretera_Piura_Sechura_2);
        function pop_Puntos_Geodesicos_3(feature, layer) {
            layer.on({
                mouseout: function(e) {
                    for (var i in e.target._eventParents) {
                        if (typeof e.target._eventParents[i].resetStyle === 'function') {
                            e.target._eventParents[i].resetStyle(e.target);
                        }
                    }
                },
                mouseover: highlightFeature,
            });
            var popupContent = '<table>\
                    <tr>\
                        <th scope="row">X</th>\
                        <td>' + (feature.properties['X'] !== null ? autolinker.link(String(feature.properties['X']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Y</th>\
                        <td>' + (feature.properties['Y'] !== null ? autolinker.link(String(feature.properties['Y']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Z</th>\
                        <td>' + (feature.properties['Z'] !== null ? autolinker.link(String(feature.properties['Z']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">PUNTO</th>\
                        <td>' + (feature.properties['PUNTO'] !== null ? autolinker.link(String(feature.properties['PUNTO']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_Puntos_Geodesicos_3_0() {
            return {
                pane: 'pane_Puntos_Geodesicos_3',
        rotationAngle: 0.0,
        rotationOrigin: 'center center',
        icon: L.icon({
            iconUrl: 'markers/Puntos_Geodesicos_3.svg',
            iconSize: [23.56, 23.56]
        }),
                interactive: true,
            }
        }
        function style_Puntos_Geodesicos_3_1() {
            return {
                pane: 'pane_Puntos_Geodesicos_3',
        rotationAngle: 0.0,
        rotationOrigin: 'center center',
        icon: L.icon({
            iconUrl: 'markers/Puntos_Geodesicos_3.svg',
            iconSize: [15.2, 15.2]
        }),
                interactive: true,
            }
        }
        map.createPane('pane_Puntos_Geodesicos_3');
        map.getPane('pane_Puntos_Geodesicos_3').style.zIndex = 403;
        map.getPane('pane_Puntos_Geodesicos_3').style['mix-blend-mode'] = 'normal';
        var layer_Puntos_Geodesicos_3 = new L.geoJson.multiStyle(json_Puntos_Geodesicos_3, {
            attribution: '',
            interactive: true,
            dataVar: 'json_Puntos_Geodesicos_3',
            layerName: 'layer_Puntos_Geodesicos_3',
            pane: 'pane_Puntos_Geodesicos_3',
            onEachFeature: pop_Puntos_Geodesicos_3,
            pointToLayers: [function (feature, latlng) {
                var context = {
                    feature: feature,
                    variables: {}
                };
                return L.marker(latlng, style_Puntos_Geodesicos_3_0(feature));
            },function (feature, latlng) {
                var context = {
                    feature: feature,
                    variables: {}
                };
                return L.marker(latlng, style_Puntos_Geodesicos_3_1(feature));
            },
        ]});
        bounds_group.addLayer(layer_Puntos_Geodesicos_3);
        map.addLayer(layer_Puntos_Geodesicos_3);
        var overlaysTree = [
            {label: '<img src="legend/Puntos_Geodesicos_3.png" /> Puntos_Geodesicos', layer: layer_Puntos_Geodesicos_3},
            {label: '<img src="legend/Carretera_Piura_Sechura_2.png" /> Carretera_Piura_Sechura', layer: layer_Carretera_Piura_Sechura_2},
            {label: 'La_Gran_Piura<br /><table><tr><td style="text-align: center;"><img src="legend/La_Gran_Piura_1_VIVEMAS0.png" /></td><td>VIVEMAS</td></tr><tr><td style="text-align: center;"><img src="legend/La_Gran_Piura_1_1.png" /></td><td></td></tr></table>', layer: layer_La_Gran_Piura_1},
            {label: "Google Satellite", layer: layer_GoogleSatellite_0},]
        var lay = L.control.layers.tree(null, overlaysTree,{
            //namedToggle: true,
            //selectorBack: false,
            //closedSymbol: '&#8862; &#x1f5c0;',
            //openedSymbol: '&#8863; &#x1f5c1;',
            //collapseAll: 'Collapse all',
            //expandAll: 'Expand all',
            collapsed: true,
        });
        lay.addTo(map);
        setBounds();
        resetLabels([layer_La_Gran_Piura_1]);
        map.on("zoomend", function(){
            resetLabels([layer_La_Gran_Piura_1]);
        });
        map.on("layeradd", function(){
            resetLabels([layer_La_Gran_Piura_1]);
        });
        map.on("layerremove", function(){
            resetLabels([layer_La_Gran_Piura_1]);
        });
        </script>        
    </body>
</html>
